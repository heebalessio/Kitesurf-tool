<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B2321">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kite Lernen">
<title>Surf Farm · Kitesurf Lernen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2321;
    --petrol:#0B2523;
    --petrol-3:#164743;
    --sun:#EDE84C;
    --sun-dim:#c9c53f;
    --foam:#A9D2CB;
    --paper:#F2F1EA;
    --muted:#5c6a67;
    --ok:#2FA36B;
    --ok-bg:#e3f4ea;
    --no:#D24A46;
    --no-bg:#fbe6e5;
    --shadow:0 16px 40px rgba(0,0,0,.34);
    --radius:22px;
    --spring:cubic-bezier(.34,1.4,.5,1);
    --ease:cubic-bezier(.16,.84,.3,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--petrol);
    color:var(--paper);
    min-height:100vh;min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  .display{font-family:'Archivo Black','Archivo',sans-serif;font-weight:900;letter-spacing:-.01em;text-transform:uppercase;line-height:.9}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ===== Ambient underwater layer ===== */
  #ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
    background:radial-gradient(130% 70% at 50% -8%, #1f6259 0%, rgba(31,98,89,0) 52%), var(--petrol);}
  .glow{position:absolute;border-radius:50%;filter:blur(64px);opacity:.55;pointer-events:none}
  .glow.a{width:65vw;height:65vw;background:#1c6f66;top:-16vh;left:-12vw;animation:drift1 26s ease-in-out infinite}
  .glow.b{width:55vw;height:55vw;background:#1d534e;bottom:-14vh;right:-14vw;animation:drift2 33s ease-in-out infinite}
  .glow.c{width:38vw;height:38vw;background:#2a7d72;top:38vh;right:8vw;opacity:.3;animation:drift1 30s ease-in-out infinite reverse}
  @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(6vw,4vh)}}
  @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-5vw,-5vh)}}
  .bubble{position:absolute;bottom:-40px;left:var(--x);width:var(--s);height:var(--s);border-radius:50%;
    background:radial-gradient(circle at 32% 30%, rgba(255,255,255,.55), rgba(169,210,203,.14) 70%);
    box-shadow:inset 0 0 3px rgba(255,255,255,.4);opacity:0;
    animation:rise var(--d) linear var(--delay) infinite}
  @keyframes rise{
    0%{transform:translate(0,0) scale(.75);opacity:0}
    9%{opacity:var(--o)}
    88%{opacity:var(--o)}
    100%{transform:translate(var(--drift),-108dvh) scale(1.05);opacity:0}
  }

  /* ===== Shell ===== */
  #shell{position:relative;z-index:1;max-width:600px;margin:0 auto;min-height:100dvh;
    display:flex;flex-direction:column;background:transparent;
    padding:calc(env(safe-area-inset-top) + 6px) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 4px) env(safe-area-inset-left);}

  /* ===== Top bar ===== */
  #topbar{display:flex;align-items:center;gap:10px;padding:8px 14px 8px;min-height:48px;
    position:sticky;top:0;z-index:20;
    background:linear-gradient(rgba(11,37,35,.72), rgba(11,37,35,.28));
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
  #backBtn{display:none;align-items:center;gap:5px;color:var(--foam);font-weight:700;font-size:15px;
    padding:8px 12px;border-radius:12px;transition:background .15s, transform .12s}
  #backBtn.show{display:inline-flex;animation:fadeIn .3s ease both}
  #backBtn:active{background:rgba(255,255,255,.1);transform:translateX(-2px)}
  #barTitle{flex:1;text-align:center;font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--foam);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #barSpacer{width:64px}

  /* ===== App content ===== */
  #app{flex:1;padding:6px 18px 34px}
  .screen{will-change:transform,opacity}
  .enter-fwd{animation:enterFwd .42s var(--ease) both}
  .enter-back{animation:enterBack .42s var(--ease) both}
  .enter-fade{animation:enterFade .5s var(--ease) both}
  @keyframes enterFwd{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
  @keyframes enterBack{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:none}}
  @keyframes enterFade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* ===== Logo ===== */
  .mark{width:98px;height:98px;display:block;margin:8px auto 0;animation:floaty 6s ease-in-out infinite;
    filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  /* ===== Home hero ===== */
  .hero{text-align:center;padding:2px 0 20px}
  .hero .kicker{color:var(--foam);letter-spacing:.34em;font-size:11px;font-weight:700;text-transform:uppercase;
    margin:16px 0 6px;animation:fadeIn .8s ease both;animation-delay:.28s}
  .hero h1{margin:0;font-size:clamp(48px,18vw,78px)}
  .hero h1 span{display:block;overflow:hidden;padding:2px 0}
  .hero h1 span b{display:block;font-weight:inherit;animation:wordUp .85s var(--spring) both}
  .hero h1 .l1 b{color:var(--sun);text-shadow:0 6px 30px rgba(237,232,76,.28)}
  .hero h1 .l2 b{color:var(--paper);animation-delay:.12s}
  @keyframes wordUp{from{transform:translateY(105%)}to{transform:translateY(0)}}
  .hero .sub{margin:14px auto 0;max-width:286px;color:#c7d6d3;font-size:14.5px;line-height:1.45;
    animation:fadeIn .8s ease both;animation-delay:.4s}

  /* section label */
  .seclabel{display:flex;align-items:center;gap:10px;margin:24px 4px 12px;color:var(--foam);
    animation:fadeIn .6s ease both;animation-delay:.35s}
  .seclabel .num{font-family:'Archivo Black';font-size:13px;color:var(--sun)}
  .seclabel .txt{letter-spacing:.2em;text-transform:uppercase;font-size:12px;font-weight:700;opacity:.85}
  .seclabel .rule{flex:1;height:1px;background:linear-gradient(90deg,rgba(169,210,203,.5),rgba(169,210,203,0))}

  /* ===== Big exam card ===== */
  .examcard{position:relative;display:flex;align-items:center;gap:14px;width:100%;text-align:left;overflow:hidden;
    background:linear-gradient(135deg,#f2ed5c,#e6df3d);color:var(--ink);border-radius:var(--radius);padding:20px 20px;
    box-shadow:0 16px 34px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.25) inset, 0 6px 30px rgba(237,232,76,.22);
    transition:transform .16s var(--spring), box-shadow .2s;
    animation:enterFade .55s var(--ease) both;animation-delay:.2s}
  .examcard::after{content:'';position:absolute;top:0;left:-60%;width:45%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.55),transparent);
    transform:skewX(-18deg);animation:sheen 6.5s ease-in-out 1.4s infinite}
  @keyframes sheen{0%{left:-60%}22%{left:130%}100%{left:130%}}
  .examcard:active{transform:scale(.975)}
  .examcard .t{font-family:'Archivo Black';text-transform:uppercase;font-size:20px;letter-spacing:-.01em}
  .examcard .d{font-size:13px;font-weight:600;opacity:.72;margin-top:3px}
  .examcard .arr{margin-left:auto;font-size:24px;font-weight:900}

  /* ===== Chapter list ===== */
  .chapgrid{display:flex;flex-direction:column;gap:10px}
  .chap{display:flex;align-items:center;gap:14px;width:100%;text-align:left;opacity:1;
    background:linear-gradient(180deg,#f6f5ef,#eceadf);color:var(--ink);border-radius:16px;padding:15px 16px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);transition:filter .15s, box-shadow .18s, transform .18s var(--ease);
    animation:cardIn .55s var(--ease) both;animation-delay:calc(var(--i)*.055s + .1s)}
  @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .chap:active{filter:brightness(.96);box-shadow:0 4px 12px rgba(0,0,0,.22)}
  .chap .cnum{font-family:'Archivo Black';font-size:15px;color:var(--sun-dim);min-width:32px}
  .chap .cbody{flex:1;min-width:0}
  .chap .ctitle{font-weight:700;font-size:16.5px;line-height:1.15}
  .chap .cmeta{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600}
  .ring{--p:0;width:36px;height:36px;border-radius:50%;
    background:conic-gradient(var(--ok) calc(var(--p)*1%), #d8d7cd 0);display:grid;place-items:center;flex:none}
  .ring::after{content:'';width:28px;height:28px;border-radius:50%;background:#efeee5}
  .ringwrap{position:relative;display:grid;place-items:center}
  .chap .go{color:#b9b8ad;font-size:22px;font-weight:900;transition:transform .18s var(--spring)}
  .chap:active .go{transform:translateX(3px)}

  /* ===== Chapter detail ===== */
  .cd-head{text-align:center;padding:16px 0 8px}
  .cd-head .n{font-family:'Archivo Black';color:var(--sun);font-size:16px;letter-spacing:.05em}
  .cd-head h2{margin:6px 0 0;font-size:clamp(30px,9vw,42px);color:var(--paper);text-shadow:0 6px 26px rgba(0,0,0,.3)}
  .cd-head .cnt{margin-top:10px;color:#bcd0cc;font-size:13.5px;font-weight:600}
  .actions{display:flex;flex-direction:column;gap:12px;margin-top:22px}
  .bigbtn{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
    border-radius:18px;padding:19px 20px;transition:transform .16s var(--spring), box-shadow .2s;
    box-shadow:0 10px 24px rgba(0,0,0,.22);animation:cardIn .5s var(--ease) both}
  .bigbtn:nth-of-type(1){animation-delay:.08s}
  .bigbtn:nth-of-type(2){animation-delay:.16s}
  .bigbtn:active{transform:scale(.975)}
  .bigbtn .t{font-family:'Archivo Black';text-transform:uppercase;font-size:18px}
  .bigbtn .d{font-size:12.5px;font-weight:600;opacity:.72;margin-top:2px}
  .bigbtn .arr{margin-left:auto;font-size:20px;font-weight:900;opacity:.6;transition:transform .18s var(--spring)}
  .bigbtn:active .arr{transform:translateX(3px)}
  .bigbtn.learn{background:linear-gradient(180deg,#f6f5ef,#e9e7dc);color:var(--ink)}
  .bigbtn.quiz{background:linear-gradient(180deg,#1b524d,#153f3b);color:var(--paper);box-shadow:0 10px 24px rgba(0,0,0,.26), inset 0 0 0 1.5px rgba(169,210,203,.35)}

  /* ===== Learn flashcards (3D flip) ===== */
  .lc-top{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px;color:var(--foam)}
  .lc-top .lbl{letter-spacing:.16em;text-transform:uppercase;font-size:11px;font-weight:700;opacity:.85}
  .lc-top .cnt{font-family:'Archivo Black';font-size:13px;color:var(--sun)}
  .flashwrap{perspective:1700px}
  .flash{position:relative;min-height:400px;transform-style:preserve-3d;cursor:pointer;
    transition:transform .6s var(--spring);animation:dealIn .5s var(--ease) both}
  @keyframes dealIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
  .flash.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;
    display:flex;flex-direction:column;padding:26px 22px;border-radius:var(--radius);overflow:auto;
    background:linear-gradient(180deg,#f7f6f0,#eceadf);box-shadow:var(--shadow)}
  .face.back{transform:rotateY(180deg);background:linear-gradient(180deg,#fbfaf3,#eef0e2)}
  .face .tag{align-self:flex-start;background:var(--sun);color:var(--ink);font-weight:800;font-size:11px;
    letter-spacing:.12em;text-transform:uppercase;padding:6px 11px;border-radius:999px;margin-bottom:18px}
  .face.back .tag{background:var(--petrol-3);color:var(--paper)}
  .face h3{margin:0;font-size:30px;line-height:1.08;font-family:'Archivo Black';letter-spacing:-.01em;color:var(--ink)}
  .face .lead{margin-top:14px;color:#5b6864;font-size:14px;font-weight:600;line-height:1.4}
  .face p{margin:0;font-size:17px;line-height:1.55;color:#27332f}
  .face p b{color:var(--ink);font-weight:800}
  .face .flip-hint{margin-top:auto;padding-top:20px;display:flex;align-items:center;gap:8px;
    color:#9aa39f;font-size:12px;font-weight:700;letter-spacing:.02em}
  .flip-dot{width:20px;height:20px;border-radius:50%;border:2px solid #c3c8bf;position:relative;flex:none}
  .flip-dot::before{content:'';position:absolute;inset:3px;border-radius:50%;border:2px solid transparent;
    border-top-color:#9aa39f;border-right-color:#9aa39f;animation:spin 3.4s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:18px 0 2px}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(169,210,203,.32);transition:all .3s var(--spring)}
  .dot.on{background:var(--sun);width:22px;border-radius:4px}
  .navrow{display:flex;gap:12px;margin-top:16px}
  .navrow button{flex:1;border-radius:15px;padding:16px;font-weight:800;font-size:15px;transition:transform .14s var(--spring), opacity .2s}
  .navrow button:active{transform:scale(.96)}
  .navrow .prev{background:linear-gradient(180deg,#1b524d,#153f3b);color:var(--paper);box-shadow:inset 0 0 0 1.5px rgba(169,210,203,.35)}
  .navrow .prev:disabled{opacity:.3}
  .navrow .next{background:linear-gradient(180deg,#f2ed5c,#e6df3d);color:var(--ink);box-shadow:0 8px 20px rgba(237,232,76,.22)}

  /* ===== Quiz ===== */
  .qbar{display:flex;align-items:center;gap:12px;margin:4px 2px 18px}
  .qbar .step{font-family:'Archivo Black';font-size:13px;color:var(--sun);white-space:nowrap}
  .qprog{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden}
  .qprog i{display:block;height:100%;width:0;border-radius:99px;
    background:linear-gradient(90deg,#c9c53f,var(--sun));transition:width .55s var(--ease)}
  .qcard{background:linear-gradient(180deg,#f7f6f0,#efeee4);color:var(--ink);border-radius:var(--radius);
    padding:22px 20px;box-shadow:var(--shadow)}
  .qcard .qtag{color:var(--sun-dim);font-weight:800;font-size:11px;letter-spacing:.13em;text-transform:uppercase}
  .qcard h3{margin:8px 0 18px;font-size:22px;line-height:1.28;font-family:'Archivo',sans-serif;font-weight:700}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:center;gap:12px;text-align:left;width:100%;opacity:1;
    background:#fff;border:2px solid #e0dfd4;border-radius:14px;padding:14px;
    font-size:16px;font-weight:600;color:var(--ink);
    transition:transform .12s var(--spring), border-color .15s, background .15s;
    animation:optIn .4s ease both;animation-delay:calc(var(--i)*.06s + .05s)}
  @keyframes optIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .opt:not([disabled]):active{transform:scale(.98)}
  .opt .k{width:27px;height:27px;border-radius:9px;background:#eceadf;color:#7a7a6c;font-weight:800;font-size:13px;
    display:grid;place-items:center;flex:none;transition:all .2s}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg);animation:pop .5s var(--spring)}
  .opt.correct .k{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--no);background:var(--no-bg);animation:shake .42s ease}
  .opt.wrong .k{background:var(--no);color:#fff}
  .opt.dim{filter:grayscale(.5);border-color:#eae8dd;color:#adaa9e}
  .opt.dim .k{background:#e8e6db;color:#b4b1a4}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.045)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}18%{transform:translateX(-7px)}38%{transform:translateX(7px)}58%{transform:translateX(-4px)}78%{transform:translateX(4px)}}
  .explain{margin-top:14px;padding:14px 16px;border-radius:14px;font-size:14px;line-height:1.5;font-weight:500;display:none}
  .explain.show{display:block;animation:slideDown .38s var(--ease) both}
  @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .explain.good{background:var(--ok-bg);color:#175c3b}
  .explain.bad{background:var(--no-bg);color:#8a2b28}
  .explain b{font-weight:800}
  .qnext{width:100%;margin-top:16px;background:linear-gradient(180deg,#f2ed5c,#e6df3d);color:var(--ink);
    border-radius:15px;padding:16px;font-weight:800;font-size:16px;box-shadow:0 8px 20px rgba(237,232,76,.22);
    transition:transform .14s var(--spring);display:none}
  .qnext.show{display:block;animation:riseUp .4s var(--spring) both}
  @keyframes riseUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .qnext:active{transform:scale(.98)}

  /* ===== Results ===== */
  .result{text-align:center;padding:14px 0}
  .scoredial{position:relative;width:184px;height:184px;margin:10px auto 8px;animation:pop .6s var(--spring) both}
  .scoredial svg{transform:rotate(-90deg)}
  .scoredial .inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .scoredial .pct{font-family:'Archivo Black';font-size:46px;color:var(--paper);line-height:1}
  .scoredial .frac{color:var(--foam);font-weight:700;font-size:14px;margin-top:4px}
  .result .verdict{font-family:'Archivo Black';text-transform:uppercase;font-size:27px;margin:10px 0 4px;
    animation:riseUp .5s var(--spring) both;animation-delay:.15s}
  .result .verdict.shine{background:linear-gradient(90deg,#EDE84C,#fff8b0,#EDE84C);background-size:220% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:riseUp .5s var(--spring) both, shimmer 2.6s linear .5s infinite}
  @keyframes shimmer{to{background-position:220% 0}}
  .result .vsub{color:#c7d6d3;font-size:14.5px;max-width:300px;margin:0 auto;line-height:1.45;
    animation:fadeIn .6s ease both;animation-delay:.35s}
  .review{margin-top:24px;text-align:left}
  .review .rh{color:var(--foam);letter-spacing:.16em;text-transform:uppercase;font-size:11px;font-weight:700;margin:0 2px 10px}
  .ritem{background:linear-gradient(180deg,#f7f6f0,#efeee4);color:var(--ink);border-radius:15px;padding:14px 15px;margin-bottom:10px;
    animation:cardIn .5s var(--ease) both}
  .ritem .rq{font-weight:700;font-size:15px;line-height:1.3}
  .ritem .ra{font-size:13.5px;margin-top:8px;line-height:1.45}
  .ritem .ra .x{color:var(--no);font-weight:700}
  .ritem .ra .c{color:var(--ok);font-weight:800}
  .allright{background:linear-gradient(180deg,#f7f6f0,#efeee4);color:var(--ink);border-radius:15px;padding:18px;text-align:center;font-weight:700}
  .rbtns{display:flex;flex-direction:column;gap:11px;margin-top:24px}
  .rbtns button{border-radius:16px;padding:17px;font-weight:800;font-size:16px;transition:transform .14s var(--spring)}
  .rbtns button:active{transform:scale(.98)}
  .rbtns .primary{background:linear-gradient(180deg,#f2ed5c,#e6df3d);color:var(--ink);box-shadow:0 10px 24px rgba(237,232,76,.22)}
  .rbtns .ghost{background:linear-gradient(180deg,#1b524d,#153f3b);color:var(--paper);box-shadow:inset 0 0 0 1.5px rgba(169,210,203,.35)}

  .footer{text-align:center;color:#5f7370;font-size:11px;font-weight:600;padding:22px 0 6px;letter-spacing:.02em;
    animation:fadeIn .8s ease both;animation-delay:.5s}
  .footer b{color:var(--foam)}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
    #ambient .bubble,#ambient .glow{display:none!important}
    .flash{transition:none}
    .flip-dot::before{display:none}
  }
</style>
</head>
<body>
<div id="ambient">
  <div class="glow a"></div><div class="glow b"></div><div class="glow c"></div>
  <span class="bubble" style="--x:8%;--s:9px;--d:17s;--delay:-1s;--o:.10;--drift:16px"></span>
  <span class="bubble" style="--x:22%;--s:6px;--d:21s;--delay:-8s;--o:.08;--drift:-12px"></span>
  <span class="bubble" style="--x:35%;--s:13px;--d:15s;--delay:-4s;--o:.10;--drift:20px"></span>

/* ---------------- Persistence (optional, safe) ---------------- */
const Store = {
  cache:null,
  async load(){
    if(this.cache) return this.cache;
    this.cache = {};
    try{
      if(window.storage && window.storage.get){
        const r = await window.storage.get('progress');
        if(r && r.value) this.cache = JSON.parse(r.value);
      }
    }catch(e){}
    return this.cache;
  },
  async saveBest(id, pct){
    const p = await this.load();
    if(!p[id] || pct > p[id]){
      p[id] = pct;
      try{ if(window.storage && window.storage.set) await window.storage.set('progress', JSON.stringify(p)); }catch(e){}
    }
  }
};

/* ---------------- Navigation ---------------- */
const app = document.getElementById('app');
const backBtn = document.getElementById('backBtn');
const barTitle = document.getElementById('barTitle');
let navStack = [];
let current = {screen:'home'};
let pendingEnter = 'fade';

function mount(html){
  app.innerHTML = html;
  const el = app.firstElementChild;
  if(el){
    const cls = pendingEnter==='fwd'?'enter-fwd':pendingEnter==='back'?'enter-back':'enter-fade';
    el.classList.add(cls);
  }
  pendingEnter = 'fade';
}
function setBar(title, showBack){ barTitle.textContent = title; backBtn.classList.toggle('show', !!showBack); }
function go(state){ navStack.push(current); current = state; pendingEnter='fwd'; render(); window.scrollTo(0,0); }
function back(){ if(navStack.length){ current = navStack.pop(); } else { current={screen:'home'}; navStack=[]; } pendingEnter='back'; render(); window.scrollTo(0,0); }
function home(){ navStack=[]; current={screen:'home'}; pendingEnter='back'; render(); window.scrollTo(0,0); }
backBtn.addEventListener('click', back);

/* ---------------- Helpers ---------------- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function chapterById(id){ return CHAPTERS.find(c=>c.id===id); }
const LETTERS=['A','B','C','D','E'];

/* ---------------- Dispatcher ---------------- */
async function render(){
  const s = current;
  if(s.screen==='home') return renderHome();
  if(s.screen==='chapter') return renderChapter(s.id);
  if(s.screen==='learn') return renderLearn(s.id, s.i||0);
  if(s.screen==='quiz') return renderQuiz();
  if(s.screen==='result') return renderResult();
}

/* -------- Quiz engine -------- */
let quiz = null;
let lastQuizPct = 0;

function startChapterQuiz(id){
  const c = chapterById(id);
  const qs = shuffle(c.questions).map(prepQuestion);
  quiz = { title:c.title, context:id, questions:qs, index:0, correct:0, answered:false, wrong:[] };
  lastQuizPct = 0;
  go({screen:'quiz'});
}
function startMixedExam(){
  let pool=[];
  CHAPTERS.forEach(c=> c.questions.forEach(q=> pool.push({...q, _chap:c.title})));
  const picked = shuffle(pool).slice(0,15).map(prepQuestion);
  quiz = { title:'Gemischte Prüfung', context:'mixed', questions:picked, index:0, correct:0, answered:false, wrong:[] };
  lastQuizPct = 0;
  go({screen:'quiz'});
}
function prepQuestion(q){
  const opts = q.options.map((t,idx)=>({text:t, correct:idx===q.correct}));
  const sh = shuffle(opts);
  return { q:q.q, chap:q._chap||null, explain:q.explain, opts:sh, correctIdx:sh.findIndex(o=>o.correct) };
}

function renderQuiz(){
  const Q = quiz.questions[quiz.index];
  const n = quiz.questions.length;
  setBar(quiz.title, true);
  const optsHtml = Q.opts.map((o,idx)=>
    `<button class="opt" data-opt="${idx}" style="--i:${idx}"><span class="k">${LETTERS[idx]}</span><span>${o.text}</span></button>`
  ).join('');
  mount(`<div class="screen">
    <div class="qbar">
      <span class="step">Frage ${quiz.index+1} / ${n}</span>
      <span class="qprog"><i></i></span>
    </div>
    <div class="qcard">
      ${Q.chap?`<div class="qtag">${Q.chap}</div>`:''}
      <h3>${Q.q}</h3>
      <div class="opts">${optsHtml}</div>
      <div class="explain" id="explain"></div>
      <button class="qnext" id="qnext">${quiz.index+1===n?'Ergebnis anzeigen ›':'Nächste Frage ›'}</button>
    </div>
  </div>`);
  bindNav();
  quiz.answered=false;
  document.querySelectorAll('[data-opt]').forEach(b=>{
    b.addEventListener('click',()=>answer(parseInt(b.getAttribute('data-opt'),10)));
  });
  document.getElementById('qnext').addEventListener('click', nextQuestion);
  // animierter Fortschrittsbalken
  const bar = app.querySelector('.qprog i');
  const cur = Math.round(quiz.index/n*100);
  bar.style.width = lastQuizPct+'%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ bar.style.width = cur+'%'; }));
  lastQuizPct = cur;
}

function answer(chosen){
  if(quiz.answered) return;
  quiz.answered=true;
  const Q = quiz.questions[quiz.index];
  const btns = document.querySelectorAll('.opt');
  const ok = chosen===Q.correctIdx;
  btns.forEach((b,idx)=>{
    b.setAttribute('disabled','');
    if(idx===Q.correctIdx) b.classList.add('correct');
    else if(idx===chosen) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(ok) quiz.correct++;
  else quiz.wrong.push({q:Q.q, chosen:Q.opts[chosen].text, correct:Q.opts[Q.correctIdx].text});
  const ex = document.getElementById('explain');
  ex.className = 'explain show ' + (ok?'good':'bad');
  ex.innerHTML = (ok?'<b>Richtig!</b> ':'<b>Leider falsch.</b> ') + Q.explain;
  document.getElementById('qnext').classList.add('show');
}

async function nextQuestion(){
  if(quiz.index+1 < quiz.questions.length){
    quiz.index++;
    pendingEnter='fwd';
    renderQuiz();
  } else {
    const pct = Math.round(quiz.correct/quiz.questions.length*100);
    if(quiz.context!=='mixed') await Store.saveBest(quiz.context, pct);
    go({screen:'result'});
  }
}

function renderResult(){
  const total = quiz.questions.length;
  const correct = quiz.correct;
  const pct = Math.round(correct/total*100);
  setBar('Ergebnis', true);
  let verdict, vsub, color, shine='';
  if(pct>=90){ verdict='Kite-Ready!'; vsub='Stark! Diesen Stoff hast du im Griff.'; color='#EDE84C'; shine='shine'; }
  else if(pct>=70){ verdict='Sitzt gut'; vsub='Solide Runde – ein paar Details noch wiederholen.'; color='#A9D2CB'; }
  else if(pct>=50){ verdict='Fast dran'; vsub='Guter Anfang. Geh die Lernkarten nochmal durch.'; color='#f0b64a'; }
  else { verdict='Nochmal lernen'; vsub='Kein Stress – zurück zu den Karteikarten und neu probieren.'; color='#e08a6a'; }

  const r=78, circ=2*Math.PI*r, off=circ*(1-pct/100);
  const review = quiz.wrong.length ? `
    <div class="review">
      <div class="rh">Zum Nachlesen (${quiz.wrong.length})</div>
      ${quiz.wrong.map((w,k)=>`<div class="ritem" style="animation-delay:${.1+k*.06}s">
        <div class="rq">${w.q}</div>
        <div class="ra"><span class="x">Deine Antwort:</span> ${w.chosen}<br><span class="c">Richtig:</span> ${w.correct}</div>
      </div>`).join('')}
    </div>` : `<div class="review"><div class="allright">Alles richtig – keine Fehler.</div></div>`;

  const retry = quiz.context==='mixed'
    ? `<button class="primary" data-go="mixed">Neue Prüfung ›</button>`
    : `<button class="primary" data-go="quizChapter" data-id="${quiz.context}">Nochmal versuchen ›</button>`;
  const learnBtn = quiz.context!=='mixed'
    ? `<button class="ghost" data-go="learn" data-id="${quiz.context}">Thema nochmal lernen</button>` : '';

  mount(`<div class="screen result">
    <div class="scoredial">
      <svg width="184" height="184" viewBox="0 0 180 180">
        <circle cx="90" cy="90" r="${r}" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="14"/>
        <circle cx="90" cy="90" r="${r}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${reducedMotion?off:circ}" id="dial"/>
      </svg>
      <div class="inner"><div class="pct" id="pctNum">0%</div><div class="frac">${correct} / ${total} richtig</div></div>
    </div>
    <div class="verdict display ${shine}">${verdict}</div>
    <div class="vsub">${vsub}</div>
    ${review}
    <div class="rbtns">${retry}${learnBtn}
      <button class="ghost" data-go="home">Zur Startseite</button>
    </div>
  </div>`);
  bindNav();
  const dial = document.getElementById('dial');
  const pctNum = document.getElementById('pctNum');
  if(reducedMotion){ pctNum.textContent = pct+'%'; }
  else {
    requestAnimationFrame(()=>{ if(dial){ dial.style.transition='stroke-dashoffset 1.1s cubic-bezier(.2,.7,.2,1)'; dial.style.strokeDashoffset=off; }});
    const t0=performance.now();
    (function step(t){
      const p=Math.min(1,(t-t0)/1100); const e=1-Math.pow(1-p,3);
      pctNum.textContent = Math.round(e*pct)+'%';
      if(p<1) requestAnimationFrame(step);
    })(t0);
  }
}

/* ---------------- Bind data-go ---------------- */
function bindNav(){
  document.querySelectorAll('[data-go]').forEach(b=>{
    b.addEventListener('click',()=>{
      const t=b.getAttribute('data-go');
      const id=b.getAttribute('data-id');
      if(t==='home') return home();
      if(t==='chapter') return go({screen:'chapter', id});
      if(t==='learn') return go({screen:'learn', id, i:0});
      if(t==='quizChapter') return startChapterQuiz(id);
      if(t==='mixed') return startMixedExam();
    });
  });
}

/* ---------------- Card gestures (tap=flip, swipe=nav) ---------------- */
function addCardGestures(el, onNext, onPrev, onTap){
  if(!el) return;
  let x0=null,y0=null,t0=0,moved=false;
  el.addEventListener('pointerdown',e=>{ x0=e.clientX;y0=e.clientY;t0=Date.now();moved=false; });
  el.addEventListener('pointermove',e=>{ if(x0!==null && (Math.abs(e.clientX-x0)>8||Math.abs(e.clientY-y0)>8)) moved=true; });
  el.addEventListener('pointerup',e=>{
    if(x0===null) return;
    const dx=e.clientX-x0, dy=e.clientY-y0, dt=Date.now()-t0;
    if(Math.abs(dx)>52 && Math.abs(dx)>Math.abs(dy)){ dx<0?onNext():onPrev(); }
    else if(!moved && dt<600){ onTap(); }
    x0=null;
  });
  el.addEventListener('pointercancel',()=>{ x0=null; });
}

/* ---------------- Start ---------------- */
render();
</script>
</body>
